<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>估分工具</title>
  <style>
    body { font-family: sans-serif; display: flex; gap: 20px; padding: 20px; }
    .panel { flex: 1; display: flex; flex-direction: column; }
    textarea { width: 100%; height: 300px; font-family: monospace; white-space: pre; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 4px; text-align: center; }
    .index-cell { background-color: #f0f8ff; font-weight: bold; }
    .sum-cell { background-color: #fff8dc; }
    .rank-cell { background-color: #e0ffe0; }
    .controls { margin-top: 10px; }
    .absent-row td {
      border: 2px solid red !important;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h2>練習區</h2>
    <textarea id="leftInput" placeholder="直接貼上表格數據"></textarea>
    <table id="leftTable"></table>
  </div>

  <div class="panel">
    <h2>測驗區</h2>
    <textarea id="rightInput" placeholder="直接貼上表格數據"></textarea>
    <table id="rightTable"></table>
    <div class="controls">
      <button onclick="estimateScore()">估分</button>
      <input type="number" id="rankInput" placeholder="輸入該生的練習總分排名">
      <div id="estimateResult"></div>
    </div>
  </div>

  <script>
    let absentIndices = new Set();
    let rightOriginalRowCount = 0;

    function updateAbsentIndices() {
      const input = document.getElementById('rightInput').value;
      if (input.trim() === '') {
        absentIndices.clear();
        rightOriginalRowCount = 0;
        return;
      }
      const rows = input.split('\n').map(row => row.split('\t'));
      rightOriginalRowCount = rows.length;
      absentIndices.clear();
      rows.forEach((cols, idx) => {
        const hasValid = cols.some(cell => {
          const trimmed = cell.trim();
          if (trimmed === '') return false;
          const num = Number(trimmed);
          return !isNaN(num);
        });
        if (!hasValid) {
          absentIndices.add(idx);
        }
      });
    }

    function isAbsent(index) {
      if (index >= rightOriginalRowCount) return true;
      return absentIndices.has(index);
    }

    function parseAndRender(inputId, tableId, shouldSort = false, useTieRanking = false) {
      const rawInput = document.getElementById(inputId).value;
      const input = rawInput.trim();
      const table = document.getElementById(tableId);
      
      // 關鍵修復：輸入為空時，直接清空表格，不生成任何行
      if (input === '') {
        table.innerHTML = '';
        // 清空對應的儲存數據，避免估分時使用舊數據
        window[tableId + 'Data'] = [];
        return;
      }

      let rows = rawInput.split('\n').map(row => row.split('\t'));
      table.innerHTML = '';

      if (rows.length === 0) return;

      if (tableId === 'rightTable') {
        rows = rows.filter(row => {
          return row.some(cell => {
            const trimmed = cell.trim();
            if (trimmed === '') return false;
            const num = Number(trimmed);
            return !isNaN(num);
          });
        });
        if (rows.length === 0) return;
      }

      const dataWithSum = rows.map((cols, idx) => {
        const nums = cols.map(cell => {
          const trimmed = cell.trim();
          if (trimmed === '') return null;
          const num = Number(trimmed);
          return isNaN(num) ? null : num;
        }).filter(n => n !== null);
        const sum = nums.reduce((a, b) => a + b, 0);
        return { index: idx, cols, sum };
      });

      const sorted = [...dataWithSum].sort((a, b) => b.sum - a.sum);

      if (useTieRanking) {
        let currentRank = 1;
        sorted.forEach((row, i) => {
          if (i > 0 && row.sum === sorted[i - 1].sum) {
            row.rank = sorted[i - 1].rank;
          } else {
            row.rank = currentRank;
          }
          currentRank = i + 2;
        });
      } else {
        sorted.forEach((row, i) => row.rank = i + 1);
      }

      window[tableId + 'Data'] = sorted;
      const renderData = shouldSort ? sorted : dataWithSum;
      const maxCols = rows[0] ? rows[0].length : 0;

      const header = document.createElement('tr');
      header.innerHTML = `<th>序號</th>${Array(maxCols).fill(0).map((_, i) => `<th>欄${i + 1}</th>`).join('')}<th>加總</th><th>名次</th>`;
      table.appendChild(header);

      renderData.forEach((row, i) => {
        const tr = document.createElement('tr');
        if (tableId === 'leftTable' && isAbsent(row.index)) {
          tr.className = 'absent-row';
        }
        const indexTd = document.createElement('td');
        indexTd.textContent = i + 1;
        indexTd.className = 'index-cell';
        tr.appendChild(indexTd);

        for (let j = 0; j < maxCols; j++) {
          const td = document.createElement('td');
          td.textContent = j < row.cols.length ? row.cols[j] : '';
          tr.appendChild(td);
        }

        const sumTd = document.createElement('td');
        sumTd.textContent = row.sum;
        sumTd.className = 'sum-cell';
        tr.appendChild(sumTd);

        const rankTd = document.createElement('td');
        const found = sorted.find(r => r.index === row.index);
        rankTd.textContent = found ? found.rank : '';
        rankTd.className = 'rank-cell';
        tr.appendChild(rankTd);

        table.appendChild(tr);
      });
    }

    document.getElementById('rightInput').addEventListener('input', () => {
      updateAbsentIndices();
      parseAndRender('rightInput', 'rightTable', true, false);
      parseAndRender('leftInput', 'leftTable', false, true);
    });

    document.getElementById('leftInput').addEventListener('input', () =>
      parseAndRender('leftInput', 'leftTable', false, true)
    );

    updateAbsentIndices();
    parseAndRender('leftInput', 'leftTable', false, true);
    parseAndRender('rightInput', 'rightTable', true, false);

    function estimateScore() {
      const rank = parseInt(document.getElementById('rankInput').value);
      const rightData = window['rightTableData'];
      if (!rightData || isNaN(rank)) {
        document.getElementById('estimateResult').textContent = '請輸入有效的排名';
        return;
      }
      if (rank < 1 || rank > rightData.length) {
        document.getElementById('estimateResult').textContent = '當前無法估分：所估分數如為第一名/最後一名需按科組指引處理';
        return;
      }
      const prev = rightData.find(r => r.rank === rank - 1);
      const next = rightData.find(r => r.rank === rank + 1);
      if (!prev || !next) {
        document.getElementById('estimateResult').textContent = '當前無法估分：所估分數如為第一名/最後一名需按科組指引處理';
        return;
      }
      const avg = (prev.sum + next.sum) / 2;
      document.getElementById('estimateResult').textContent = `估分：${avg.toFixed(2)}`;
    }
  </script>
</body>
</html>
